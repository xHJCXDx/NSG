services:
  postgres:
    image: postgres:15
    container_name: osint-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    networks:
      - nexus-net

  n8n:
    image: n8nio/n8n:latest
    container_name: osint-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=America/Argentina/Buenos_Aires
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./workflow.json:/home/node/workflow.json
      - ./n8n-entrypoint.sh:/home/node/custom-entrypoint.sh
    entrypoint: /bin/sh /home/node/custom-entrypoint.sh
    depends_on:
      - postgres
      - sentiment-api
    restart: unless-stopped
    networks:
      - nexus-net

  sentiment-api:
    build: ./sentiment-api
    container_name: osint-sentiment-api
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - nexus-net

volumes:
  postgres_data:
  n8n_data:

networks:
  nexus-net:
    driver: bridge
